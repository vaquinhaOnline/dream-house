<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajude a realizar um sonho</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>✨ Ajude a realizar um sonho</h1>

        <p>
            Essa vaquinha foi criada com o objetivo de ajudar alguém
            a conquistar o sonho de morar sozinho e começar uma nova fase da vida.
            Faça uma boa ação e contribua você também ❤️
        </p>
    <div class="progresso-area">

            <h2>💰 Já arrecadado</h2>

            <div class="valor">
                R$ <span id="contador">0</span>
            </div>

            <div class="barra">
                <div class="barra-preenchida" id="barra"></div>
            </div>

            <p class="meta">Meta: R$ 3.000</p>
    <div class="valores-sugeridos">

        <p>Escolha um valor para ajudar 💛</p>

    <div class="botoes-valores">
        <button onclick="selecionarValor(10)">R$10</button>
        <button onclick="selecionarValor(25)">R$25</button>
        <button onclick="selecionarValor(50)">R$50</button>
        <button onclick="selecionarValor(100)">R$100</button>
    </div>

</div>

    </div>

        <button class="btn-ajudar" onclick="irParaPagamento()">
            💖 Quero ajudar
        </button>

    </div>

    <!-- BOTÃO WHATSAPP -->
    <a href="https://wa.me/5585999999999?text=Olá!%20Vim%20pelo%20site!" class="whatsapp-float" target="_blank">

        <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" alt="WhatsApp">
    </a>
    <script src="scripts.js"></script>

</body>

</html>
